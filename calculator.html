<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Scientific Calculator</title>
        <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        
      }
      body{
        height: 100vh;
        display: flex;
        justify-content: center;
        background: linear-gradient(135deg,#1e3c72,#2a5298);
        background-image: url("samuel.webp");
        background-size: cover;


      }
      .Calculator{
        width: 420px;
        height: 600px;
        padding: 25px;
        border-radius: 20px;
        box-shadow:0 20px 40px rgba(0,0,0,0.25);
        background: white;
        margin-top: 30px;
        
        
      }
      .display{
        width: 100%;
        height: 70px;
        margin-bottom: 20px;
        border: none;
        outline:none;
        background:#f3f6fb;
        border-radius: 12px;
        font-size:24px;
        text-align:right;
        padding: 15px;
      }
      .buttons{
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
      }
      button{
        padding: 15px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 25px;
        transition: 0.2s;
      }
      button:hover{
        transform: translateY(-3px);
      }
        .number{ background:#f8f9fa; }
        .function{ background:#eef3ff; }
        .Operator{
        background:#2a5298;
        color:white;
    }
        .equal{
    background:#28a745;
    color:white;
    grid-column: span 4;
           }
           .Clear{
            background:#dc3545;
            color: white;
           }
           .Del{
            background:#ff9800;
            color: white;
           }
        </style>
    </head>
    <body>
        
        <div class="Calculator">
            <input type="text" id ="display" class = "display" readonly>
            <div class="buttons">
                <!--Row 1-->
                <button class="function" onclick="append('Math.PI')">π</button>
                <button class="function" onclick="append('Math.E')">e</button>
                <button class="function" onclick="append('Math. sqrt(')">√</button>
                <button class="Clear" onclick="ClearDisplay()">C</button>
                <button class="Operator" onclick="append('/')">÷</button>

                <!--Row 2-->
                <button class="number" onclick="append('7')">7</button>
                <button class="number" onclick="append('8')">8</button>
                <button class="number" onclick="append('9')">9</button>
                <button class="Del" onclick="deleteLast()">DEL</button>
                <button class="Operator" onclick="append('*')">×</button>
                
                <!--Row 3-->
                <button class="number" onclick="append('4')">4</button>
                <button class="number" onclick="append('5')">5</button>
                <button class="number" onclick="append('6')">6</button>
                <button class="function" onclick="append('Math.log10(')">log</button>
                <button class="Operator" onclick="append('-')">−</button>

                <!--Row 4-->
                <button class="number" onclick="append('1')">1</button>
                <button class="number" onclick="append('2')">2</button>
                <button class="number" onclick="append('3')">3</button>
                <button class="function" onabort="append('Math.log(')">ln</button>
                <button class="Operator" onclick="append('+')">+</button>
                
                <!--Row 5-->
                <button class="number" onclick="append('0')">0</button>
                <button class="number" onabort="append('.')">.</button>
                <button class="function" onclick="append('(')">(</button>
                <button class="function" onclick="append(')')">)</button>
                <button class="equal" onclick="calculate()">=</button>
            </div>
        </div>
        <script>
            const display = document.getElementById("display");
            function append(value){
                display.value += value;
            }
            function ClearDisplay(){
                display.value ="";
            }
            function deleteLast(){
                display.value = display.value.slice(0, -1);
            }

            function calculate(){
                try{
                    display.value = eval(display.value);
                } catch{
                    display.value = "Error";
                }
            }

        </script>
    </body>
</html>
